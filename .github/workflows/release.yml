name: Release firmware

# Tag-triggered firmware release. Builds one binary per lamp form
# (tower, wormhole, display, cube, rocket, strip) inside the official ESP-IDF
# Docker container, packages a byForm SPIFFS effects image alongside each,
# emits ESP Web Tools manifests, and publishes everything as a GitHub
# Release on this repository.
#
# Trigger: push a tag matching v*.*.* (e.g. `v1.10.0`).
# Auth:    standard GITHUB_TOKEN ã release write on this repo only, scoped
#          to this workflow's run. No extra secret needed.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

# Force bash on every `run:` step. Inside the Espressif container the runner
# auto-detects `sh` ã which breaks `compgen` and bash-only idioms below.
defaults:
  run:
    shell: bash

env:
  IDF_IMAGE: espressif/idf:v5.3.2

jobs:

  build:
    name: Build ${{ matrix.form }} (${{ matrix.chip }})
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3.2
    strategy:
      fail-fast: false
      matrix:
        # Every form builds for esp32 (Xtensa). `include` adds extra-SoC
        # variants only for the forms that actually have devices on that chip ã
        # today just the strip form on esp32c3 (RISC-V) for shrumLight. The
        # espressif/idf image already ships both toolchains, so no install step.
        form: [tower, wormhole, display, cube, rocket, strip]
        chip: [esp32]
        include:
          - form: strip
            chip: esp32c3

    steps:
      - name: Checkout firmware at tag
        uses: actions/checkout@v4

      - name: Mark workspace safe (container UID mismatch)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Symlink IDF into $HOME/esp/esp-idf
        # scripts/build.sh sources $HOME/esp/esp-idf/export.sh; inside the
        # Espressif image the IDF lives at $IDF_PATH (/opt/esp/idf). One
        # symlink makes the script work unmodified.
        run: |
          mkdir -p "$HOME/esp"
          ln -sfn "$IDF_PATH" "$HOME/esp/esp-idf"

      - name: Set firmware version from tag
        # The release tag is the source of truth for the firmware version.
        # We rewrite version.properties so the embedded build version matches
        # the GitHub Release name (a lamp reports its real firmware version
        # via GET /api).
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          API_VERSION=$(awk -F= '$1~/api\.version/{gsub(/[ \t\r]/,"",$2);print $2}' version.properties 2>/dev/null)
          [ -z "$API_VERSION" ] && API_VERSION="1.0.0"
          cat > version.properties <<EOF
          # Generated by .github/workflows/release.yml from tag $TAG.
          firmware.version=$VERSION
          api.version=$API_VERSION
          EOF
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG"         >> "$GITHUB_ENV"

          # Chip-aware naming, mirroring scripts/build.sh: esp32 keeps the bare
          # <form> stem (fleet + OTA tooling depend on it); other SoCs carry a
          # -<chip> suffix so Xtensa and RISC-V assets never collide. CHIP_FAMILY
          # is the ESP Web Tools identifier for the browser-flash manifest.
          CHIP="${{ matrix.chip }}"
          FORM="${{ matrix.form }}"
          SUFFIX="$FORM"
          [ "$CHIP" != "esp32" ] && SUFFIX="$FORM-$CHIP"
          case "$CHIP" in
            esp32)   CHIP_FAMILY="ESP32" ;;
            esp32c3) CHIP_FAMILY="ESP32-C3" ;;
            esp32s3) CHIP_FAMILY="ESP32-S3" ;;
            *) echo "unknown chip '$CHIP' ã add its ESP Web Tools family" >&2; exit 1 ;;
          esac
          echo "CHIP=$CHIP"                 >> "$GITHUB_ENV"
          echo "SUFFIX=$SUFFIX"             >> "$GITHUB_ENV"
          echo "CHIP_FAMILY=$CHIP_FAMILY"   >> "$GITHUB_ENV"
          echo "ã building $TAG (firmware=$VERSION, api=$API_VERSION, chip=$CHIP, suffix=$SUFFIX)"

      - name: Build firmware
        # Pre-source IDF's env so IDF_PYTHON_ENV_PATH lands at the correct
        # in-container path (/opt/esp/python_env/idf5.3_py3.xx_env). build.sh
        # then uses ${IDF_PYTHON_ENV_PATH:-...} which is a no-op if already
        # set, so the host-style fallback it would otherwise pick never runs.
        run: |
          source "$IDF_PATH/export.sh"
          ./scripts/build.sh --form ${{ matrix.form }} --chip ${{ matrix.chip }}

      - name: Build byForm SPIFFS effects image
        # Mirrors what scripts/profile-burn.sh --full does at the workbench:
        # build a SPIFFS image of effects/<form>/*.js + form-template/<form>.txt
        # (renamed to _form_template.txt). Lets DIY users flashing from a
        # browser get the same effect library as your bench-burned devices.
        run: |
          FORM="${{ matrix.form }}"
          STORAGE_SIZE=$(awk -F, '
            { gsub(/[ \t]/,"",$1) }
            $1=="storage" { gsub(/[ \t]/,"",$5); print $5; exit }
          ' partitions.csv)
          if [ -z "$STORAGE_SIZE" ]; then
            echo "could not parse storage partition size from partitions.csv" >&2
            exit 1
          fi
          STORAGE_OFFSET=$(awk -F, '
            { gsub(/[ \t]/,"",$1) }
            $1=="storage" { gsub(/[ \t]/,"",$4); print $4; exit }
          ' partitions.csv)
          echo "STORAGE_OFFSET=$STORAGE_OFFSET" >> "$GITHUB_ENV"

          SRC=/tmp/spiffs-src
          rm -rf "$SRC" && mkdir -p "$SRC"

          # byForm JS effects
          if compgen -G "effects/$FORM/*.js" >/dev/null 2>&1; then
            cp effects/"$FORM"/*.js "$SRC/"
            echo "ã effects:"
            ls "$SRC"/*.js | sed 's|^|    |'
          else
            echo "ã no effects for form '$FORM'"
          fi

          # Form-prompt template (display form uses display.txt)
          if [ -f "form-template/$FORM.txt" ]; then
            cp "form-template/$FORM.txt" "$SRC/_form_template.txt"
            echo "ã form template: form-template/$FORM.txt"
          else
            echo "ã no form template for '$FORM'"
          fi

          if [ -z "$(ls -A "$SRC" 2>/dev/null)" ]; then
            echo "ã no byForm content for '$FORM'; skipping effects.bin"
            exit 0
          fi

          # Effects source is per-form (chip-independent JS); the output name
          # carries the chip suffix so it pairs with the matching flash.bin.
          STAMPED="plaiiinlight_os-${VERSION}-${SUFFIX}"
          python "$IDF_PATH/components/spiffs/spiffsgen.py" \
            "$((STORAGE_SIZE))" "$SRC" "build/dist/${STAMPED}-effects.bin"
          echo "ã wrote build/dist/${STAMPED}-effects.bin"

      - name: Emit ESP Web Tools manifest
        # ESP Web Tools chains the listed parts at their offsets in a single
        # in-browser WebSerial flash. Paths are resolved relative to the
        # manifest URL ã by colocating the manifest with the .bin assets at
        # the same GitHub Release URL prefix, the bare filename works.
        run: |
          STAMPED="plaiiinlight_os-${VERSION}-${SUFFIX}"
          PARTS='[{"path":"'"${SUFFIX}-flash.bin"'","offset":0}]'
          if [ -f "build/dist/${STAMPED}-effects.bin" ]; then
            OFFSET_DEC=$(printf '%d' "$STORAGE_OFFSET")
            PARTS='[{"path":"'"${SUFFIX}-flash.bin"'","offset":0},{"path":"'"${SUFFIX}-effects.bin"'","offset":'"$OFFSET_DEC"'}]'
          fi
          mkdir -p build/dist
          cat > "build/dist/${SUFFIX}.manifest.json" <<EOF
          {
            "name": "PlaiiinLightOS ${SUFFIX}",
            "version": "${VERSION}",
            "new_install_prompt_erase": true,
            "builds": [
              { "chipFamily": "${CHIP_FAMILY}", "parts": $PARTS }
            ]
          }
          EOF
          echo "ã manifest:"
          cat "build/dist/${SUFFIX}.manifest.json"

      - name: Stage release assets (short names)
        run: |
          STAMPED="plaiiinlight_os-${VERSION}-${SUFFIX}"
          mkdir -p staging
          cp "build/dist/${STAMPED}-flash.bin" "staging/${SUFFIX}-flash.bin"
          cp "build/dist/${STAMPED}-app.bin"   "staging/${SUFFIX}-app.bin"
          if [ -f "build/dist/${STAMPED}-effects.bin" ]; then
            cp "build/dist/${STAMPED}-effects.bin" "staging/${SUFFIX}-effects.bin"
          fi
          cp "build/dist/${SUFFIX}.manifest.json" "staging/${SUFFIX}.manifest.json"
          echo "ã staged:"
          ls -lh staging | sed 's|^|    |'

      - name: Upload form artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.form }}-${{ matrix.chip }}
          path: staging/
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Collect all form artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: firmware-*
          merge-multiple: true

      - name: Compute SHA256SUMS
        working-directory: release
        run: |
          # Stable order so the file is reproducible.
          find . -maxdepth 1 -type f \( -name '*.bin' -o -name '*.json' \) \
            -printf '%P\n' | sort | xargs sha256sum > SHA256SUMS
          echo "ã SHA256SUMS:"
          cat SHA256SUMS | sed 's|^|    |'

      - name: Create release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: release
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(cat <<EOF
          Firmware build for **PlaiiinLightOS $TAG**.

          ## Forms shipped

          \`tower\` ôñ \`wormhole\` ôñ \`display\` ôñ \`cube\` ôñ \`rocket\` ôñ \`strip\` (esp32)

          SoC variants (RISC-V) carry a \`-<chip>\` suffix: \`strip-esp32c3\` (shrumLight).
          Assets without a suffix are esp32 (Xtensa). **Match the asset to your
          board's chip** ã a lamp reports its own via \`GET /api/ota/info\` (\`target\`).

          ## What's in each form

          | File | Purpose | Flash to |
          |---|---|---|
          | \`<form>-flash.bin\` | USB first-flash (bootloader + partitions + OTA data + app) | offset \`0x0\` |
          | \`<form>-app.bin\` | OTA payload ã POST to \`/api/ota\` on a running lamp | (OTA, no offset) |
          | \`<form>-effects.bin\` | byForm SPIFFS image (effects + form-template) | offset \`0x3C0000\` |
          | \`<form>.manifest.json\` | ESP Web Tools manifest for browser-based flashing | ã |

          (For a SoC variant, \`<form>\` is the suffixed stem, e.g. \`strip-esp32c3-flash.bin\`.)

          ## DIY flash recipes

          **CLI (esptool)** ã pass the matching \`--chip\`; the C3 bootloader is baked at 0x0:
          \`\`\`bash
          # esp32 form (e.g. tower)
          esptool.py --chip esp32 -p /dev/cu.usbserial-* write_flash 0x0      tower-flash.bin
          esptool.py --chip esp32 -p /dev/cu.usbserial-* write_flash 0x3C0000 tower-effects.bin

          # esp32c3 variant (e.g. strip / shrumLight)
          esptool.py --chip esp32c3 -p /dev/cu.usbmodem* write_flash 0x0      strip-esp32c3-flash.bin
          esptool.py --chip esp32c3 -p /dev/cu.usbmodem* write_flash 0x3C0000 strip-esp32c3-effects.bin
          \`\`\`

          **Browser (ESP Web Tools):** point the install button at \`<form>.manifest.json\`
          (e.g. \`tower.manifest.json\` or \`strip-esp32c3.manifest.json\`) ã the manifest's
          \`chipFamily\` selects the right target automatically.

          ## Verification

          See \`SHA256SUMS\`.
          EOF
          )
          # gh release create accepts the asset list as positional args.
          ASSETS=$(find . -maxdepth 1 -type f -printf '%P\n' | sort)
          # shellcheck disable=SC2086
          gh release create "$TAG" $ASSETS \
            --repo "$GITHUB_REPOSITORY" \
            --title "PlaiiinLightOS $TAG" \
            --notes "$NOTES"
          echo "ã release $TAG published"
